version: '3.8'

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # FIX: Changed 127.0.0.1 to the internal container hostname 'kafka'
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CLUSTER_ID: 4L62Id6vTmultXQbe7YI5A
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  stock-producer:
    build: .
    container_name: stock-producer
    command: python stock_producer.py
    working_dir: /app
    depends_on:
      - kafka
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  stock-consumer:
    build: .
    container_name: stock-consumer
    command: python stock_consumer.py
    working_dir: /app
    depends_on:
      - kafka
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1

  market-dashboard:
    build: .
    container_name: market-dashboard
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    working_dir: /app
    ports:
      - "8501:8501"
    depends_on:
      - stock-consumer
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
